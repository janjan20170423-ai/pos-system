<!DOCTYPE html>
<html>

<head>
    <link rel="icon" type="image/png" href="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP.ryKm2keuRa-_2ydvnGUsVgAAAA%3Fr%3D0%26pid%3DApi&f=1&ipt=9ecef78e0455661433179a352def747d41c8bb05ad1812968d455168d97d7c3b&ipo=images">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好點點餐系統</title>
<meta property="og:title" content="好點 POS 點餐推播">

<meta property="og:description"
content="歡迎使用">

<meta property="og:image"
content="https://janjan20170423-ai.github.io/pos-system/2026-05-28 15.41.19 janjan20170423-ai.github.io 47785fec6c5b1.jpg">

<meta property="og:url"
content="https://janjan20170423-ai.github.io/pos-system/">
<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<iframe id="pageFrame"></iframe>

<script>

// Google 試算表 CSV
const sheetUrl =
"https://docs.google.com/spreadsheets/d/1IIkNNVsf2vL6YM4tbCK80UPcHjHlrK6bXiIKP-e1qsw/gviz/tq?tqx=out:csv";

// 取得網址參數
const params = new URLSearchParams(window.location.search);

const targetPage =
    params.get("page") || "index";

const userId =
    params.get("id") || "";

console.log("targetPage =", targetPage);
console.log("userId =", userId);

// 讀取試算表
fetch(sheetUrl)
.then(res => res.text())
.then(csv => {

    const rows = csv.split("\n");

    for(let i = 1; i < rows.length; i++){

        const cols = rows[i].split(",");

        // A欄：檔名
        const fileName =
            cols[0]?.replace(/"/g,"").trim();

        // B欄：Apps Script URL
        const baseUrl =
            cols[1]?.replace(/"/g,"").trim();

        // C欄：page參數
        const pageValue =
            cols[2]?.replace(/"/g,"").trim();

        console.log("fileName =", fileName);

        if(fileName === targetPage){

            let finalUrl = baseUrl;

            // Verify_to_G：只帶 id
            if(fileName === "Verify_to_G"){

                finalUrl +=
                    `?id=${encodeURIComponent(userId)}`;

            }

            // sidebar、ManageMenu、Design、O_Menu
            else if(pageValue){

                finalUrl +=
                    `${pageValue}&id=${encodeURIComponent(userId)}`;
            }

            // index 不加任何參數

            console.log("finalUrl =", finalUrl);

            document.getElementById("pageFrame").src =
                finalUrl;

            break;
        }
    }

})
.catch(error => {
    console.error("讀取試算表失敗：", error);
});

</script>

</body>
</html>
