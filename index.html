<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好點點餐系統</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<iframe id="pageFrame"></iframe>

<script>

// Google 試算表 CSV
const sheetUrl =
"https://docs.google.com/spreadsheets/d/1IIkNNVsf2vL6YM4tbCK80UPcHjHlrK6bXiIKP-e1qsw/gviz/tq?tqx=out:csv";

fetch(sheetUrl)
.then(res => res.text())
.then(csv => {

    // 分行
    const rows = csv.split("\n");

    // 從第2行開始
    for(let i=1;i<rows.length;i++){

        const cols = rows[i].split(",");

        // A欄
        const fileName =
            cols[0]?.replace(/"/g,"").trim();

        // B欄
        const baseUrl =
            cols[1]?.replace(/"/g,"").trim();

        // C欄
        const page =
            cols[2]?.replace(/"/g,"").trim();

        // 組合 URL
        const finalUrl = baseUrl + page;

        // 指定要讀哪個檔案
        if(fileName === "index.html"){

            document.getElementById("pageFrame").src =
                finalUrl;

            break;
        }
    }

});

</script>

</body>
</html>
