<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>好點點餐系統</title>
    <meta property="og:title" content="好點 POS 點餐推播">
    <meta property="og:description" content="歡迎使用">
    <meta property="og:image" content="https://janjan20170423-ai.github.io/pos-system/2026-05-28 15.41.19 janjan20170423-ai.github.io 47785fec6c5b1.jpg">
    <meta property="og:url" content="https://janjan20170423-ai.github.io/pos-system/">

    <script>
        // 2. 設定你的 Google 試算表 ID 與工作表名稱
        const SPREADSHEET_ID = '1IIkNNVsf2vL6YM4tbCK80UPcHjHlrK6bXiIKP-e1qsw';
        const SHEET_NAME = 'Fbsh'; 

        // 3. 組合完整的動態網址
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
        
        // 4. 透過 JavaScript 異步抓取試算表資料
        fetch(jsonUrl)
            .then(response => response.text())
            .then(data => {
                // 清理 Google 回傳的 JSONP 格式字串，轉換為純 JSON
                const jsonString = data.substring(data.indexOf("{"), data.lastIndexOf("}") + 1);
                const jsonData = JSON.parse(jsonString);
                const rows = jsonData.table.rows;

                // 將試算表資料轉換為 Key-Value 物件
                const config = {};
                rows.forEach(row => {
                    // 確保欄位有資料才讀取
                    const key = row.c[0] ? row.c[0].v : null;
                    const value = row.c[1] ? row.c[1].v : '';
                    if (key) config[key.toString().trim()] = value;
                });

                // 5. 動態更新網頁的 Meta 標籤與標題
                if (config['title']) document.title = config['title'];
                if (config['og:title']) updateMeta('property', 'og:title', config['og:title']);
                if (config['og:description']) updateMeta('property', 'og:description', config['og:description']);
                if (config['og:image']) updateMeta('property', 'og:image', config['og:image']);
                if (config['og:url']) updateMeta('property', 'og:url', config['og:url']);

                // 6. 設定你的變數
                const MyGtUrl = config['og:url'] || 'https://janjan20170423-ai.github.io/pos-system/';
                const FbShurl = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(MyGtUrl);

                console.log("資料更新成功！");
                console.log("MyGtUrl:", MyGtUrl);
                console.log("FbShurl:", FbShurl);
                
                // 動態更新畫面上的文字
                if (config['title']) document.getElementById('app-title').innerText = config['title'];
                if (config['og:description']) document.getElementById('app-desc').innerText = config['og:description'];
            })
            .catch(error => console.error("讀取試算表失敗:", error));

        // 輔助函式：用來修改或新增 Meta 標籤
        function updateMeta(attr, value, content) {
            if (!content) return;
            let element = document.querySelector(`meta[${attr}="${value}"]`);
            if (element) {
                element.setAttribute('content', content);
            } else {
                element = document.createElement('meta');
                element.setAttribute(attr, value);
                element.setAttribute('content', content);
                document.head.appendChild(element);
            }
        }
    </script>
</head>
<body>

    <h1 id="app-title">好點點餐系統</h1>
    <p id="app-desc">歡迎使用</p>

</body>
</html>
