<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><?= config['title'] ?></title>
    <!-- 從試算表動態讀取 Open Graph Meta 標籤 -->
    <meta property="og:title" content="<?= config['og:title'] ?>">
    <meta property="og:description" content="<?= config['og:description'] ?>">
    <meta property="og:image" content="<?= config['og:image'] ?>">
    <meta property="og:url" content="<?= config['og:url'] ?>">
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { color: #333; margin-top: 0; text-align: center; }
        .status {
            padding: 10px;
            background-color: #e3f2fd;
            color: #0d47a1;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #555; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
<h1 id="app-title">好點點餐系統</h1>
    <p id="app-desc">歡迎使用</p>
    <div class="container">
        <h2>✍️ 修改 ManageMenu.html 固定資料</h2>
        <div class="status" id="loadStatus">⏳ 正在載入原始 ManageMenu.html 範本...</div>
        
        <label for="inputTitle">要修改的網頁標題 (Title)：</label>
        <input type="text" id="inputTitle" value="載入中...">

        <label for="inputHeading">要修改的主標題 (H1)：</label>
        <input type="text" id="inputHeading" value="載入中...">

        <button onclick="saveAndDownload()">💾 儲存並下載新的 ManageMenu.html</button>
    </div>

    <script>
// 1. 設定你的 Google 試算表 ID
        const SPREADSHEET_ID = '1IIkNNVsf2vL6YM4tbCK80UPcHjHlrK6bXiIKP-e1qsw';
        
// 2. 設定你要指定的工作表名稱（例如：選單設定、Sheet2）
const SHEET_NAME = 'Fbsh'; 

// 3. 組合完整的動態網址
const jsonUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
        // 3. 透過 JavaScript 異步抓取試算表資料
        fetch(jsonUrl)
            .then(response => response.text())
            .then(data => {
                // 清理 Google 回傳的 JSONP 格式字串，轉換為純 JSON
                const jsonString = data.substring(data.indexOf("{"), data.lastIndexOf("}") + 1);
                const jsonData = JSON.parse(jsonString);
                const rows = jsonData.table.rows;

                // 將試算表資料轉換為 Key-Value 物件
                const config = {};
                rows.forEach(row => {
                    const key = row.c[0] ? row.c[0].v : null;
                    const value = row.c[1] ? row.c[1].v : '';
                    if (key) config[key.trim()] = value;
                });

                // 4. 動態更新網頁的 Meta 標籤與標題
                if (config['title']) document.title = config['title'];
                
                updateMeta('property', 'og:title', config['og:title']);
                updateMeta('property', 'og:description', config['og:description']);
                updateMeta('property', 'og:image', config['og:image']);
                updateMeta('property', 'og:url', config['og:url']);

                // 5. 設定你的變數
                const MyGtUrl = config['og:url'] || 'https://janjan20170423-ai.github.io/pos-system/';
                const FbShurl = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(MyGtUrl);

                console.log("資料更新成功！");
                console.log("MyGtUrl:", MyGtUrl);
                console.log("FbShurl:", FbShurl);
                
                // 如果畫面有文字需要更新，也可以在這裡處理
                document.getElementById('app-title').innerText = config['title'] || '好點點餐系統';
                document.getElementById('app-desc').innerText = config['og:description'] || '歡迎使用';
            })
            .catch(error => console.error("讀取試算表失敗:", error));

        // 輔助函式：用來修改或新增 Meta 標籤
        function updateMeta(attr, value, content) {
            if (!content) return;
            let element = document.querySelector(`meta[${attr}="${value}"]`);
            if (element) {
                element.setAttribute('content', content);
            } else {
                element = document.createElement('meta');
                element.setAttribute(attr, value);
                element.setAttribute('content', content);
                document.head.appendChild(element);
            }
        }

        
        
        let originalHTMLTemplate = ""; // 用來存放抓取到的原始 HTML 字串

        // 網頁一開啟，自動去抓取同目錄下的 ManageMenu.html
        window.addEventListener('DOMContentLoaded', () => {
            fetch('ManageMenu.html')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('找不到 ManageMenu.html 檔案，請確認檔案存在。');
                    }
                    return response.text();
                })
                .then(data => {
                    originalHTMLTemplate = data;
                    document.getElementById('loadStatus').innerText = "✅ 成功載入 ManageMenu.html 範本！";
                    
                    // 這裡預設填入你原本想改的初始文字（你可以自己改掉）
                    document.getElementById('inputTitle').value = "管理選單系統";
                    document.getElementById('inputHeading').value = "歡迎使用管理後台";
                })
                .catch(error => {
                    document.getElementById('loadStatus').style.backgroundColor = "#ffebee";
                    document.getElementById('loadStatus').style.color = "#c62828";
                    document.getElementById('loadStatus').innerText = "❌ 錯誤: " + error.message;
                });
        });

        // 執行替換並下載
        function saveAndDownload() {
            if (!originalHTMLTemplate) {
                alert("尚未成功載入原始範本，請稍候再試。");
                return;
            }

            const newTitle = document.getElementById('inputTitle').value;
            const newHeading = document.getElementById('inputHeading').value;

            let modifiedHTML = originalHTMLTemplate;

            // 【關鍵修改點】
            // 這裡會用 JavaScript 的 replace 功能，把你原本 ManageMenu.html 裡「固定的字串」換成「輸入框的新字」
            // 請把下面的 "舊標題"、"舊H1文字" 換成你 ManageMenu.html 裡面實際存在的文字！
            modifiedHTML = modifiedHTML.replace("<title>舊標題</title>", `<title>${newTitle}</title>`);
            modifiedHTML = modifiedHTML.replace("<h1>舊H1文字</h1>", `<h1>${newHeading}</h1>`);

            // 產生下載檔案
            const blob = new Blob([modifiedHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ManageMenu.html'; // 下載覆蓋原本的檔名
            a.click();
        }
    </script>
</body>
</html>
